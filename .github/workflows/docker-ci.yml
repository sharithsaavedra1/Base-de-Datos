# ============================================
# CI/CD — SchoolMS Docker
# Verifica que docker-compose levanta correctamente
# ============================================
name: 🐳 Docker CI

on:
  push:
    branches: [ main ]
    paths:
      - 'database/**'
      - 'docker-compose.yml'
      - 'Dockerfile'

jobs:

  test-docker:
    name: 🐳 Test Docker Compose
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Verificar que docker-compose.yml es válido
      - name: 🔍 Validar docker-compose.yml
        run: docker compose config

      # 3. Levantar la base de datos
      - name: 🚀 Levantar contenedor
        run: |
          cd database
          docker compose up -d
          echo "⏳ Esperando que PostgreSQL esté listo..."
          sleep 10

      # 4. Verificar que PostgreSQL responde
      - name: 🏥 Health check PostgreSQL
        run: |
          docker exec schoolms-db pg_isready -U admin -d schoolms
          echo "✅ PostgreSQL está corriendo correctamente"

      # 5. Verificar que las tablas se crearon
      - name: 🗄️ Verificar tablas
        run: |
          docker exec schoolms-db psql -U admin -d schoolms -c "\\dt"
          echo "✅ Tablas verificadas"

      # 6. Bajar los contenedores
      - name: 🛑 Bajar contenedores
        if: always()
        run: |
          cd database
          docker compose down -v
