name: 🐳 Docker CI

on:
  push:
    branches: [ main ]
    paths:
      - '**.sql'
      - 'docker-compose.yml'
      - 'Dockerfile'
  pull_request:
    branches: [ main ]

jobs:

  test-docker:
    name: 🐳 Test Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔍 Validar docker-compose.yml
        run: docker compose config

      - name: 🚀 Levantar contenedor
        run: |
          docker compose up -d
          echo "⏳ Esperando que PostgreSQL esté listo..."
          sleep 15

      - name: 🏥 Health check PostgreSQL
        run: |
          docker compose ps
          echo "✅ Contenedor corriendo"

      - name: 🛑 Bajar contenedores
        if: always()
        run: docker compose down -v